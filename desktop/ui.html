<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUSTR.AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg-deep: #06090f;
    --bg-base: #0c1220;
    --bg-raised: #111a2e;
    --bg-surface: #162036;
    --border-subtle: rgba(148, 163, 184, 0.08);
    --border-medium: rgba(148, 163, 184, 0.14);
    --fg: #e2e8f0;
    --fg-secondary: #94a3b8;
    --fg-muted: #64748b;
    --accent: #3b82f6;
    --accent-glow: rgba(59, 130, 246, 0.15);
    --accent-hover: #60a5fa;
    --green: #22c55e;
    --green-glow: rgba(34, 197, 94, 0.15);
    --green-hover: #4ade80;
    --amber: #f59e0b;
    --red: #ef4444;
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg-deep);
    color: var(--fg);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  /* ── Ambient background ── */
  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80%;
    height: 80%;
    background: radial-gradient(ellipse, rgba(59, 130, 246, 0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    right: -20%;
    width: 70%;
    height: 70%;
    background: radial-gradient(ellipse, rgba(34, 197, 94, 0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 28px 20px;
  }

  /* ── Header / Topbar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0 14px;
    border-bottom: 1px solid var(--border-subtle);
    margin-bottom: 24px;
    -webkit-app-region: drag;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent) 0%, #6366f1 100%);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
  }

  .brand-text h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, var(--fg) 0%, var(--fg-secondary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .brand-text span {
    font-size: 11px;
    color: var(--fg-muted);
    letter-spacing: 0.3px;
  }

  .proxy-badge {
    -webkit-app-region: no-drag;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 14px;
    border-radius: 20px;
    background: var(--bg-raised);
    border: 1px solid var(--border-subtle);
    cursor: pointer;
    transition: all var(--transition);
  }
  .proxy-badge:hover {
    border-color: var(--border-medium);
    background: var(--bg-surface);
  }

  .proxy-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    transition: background var(--transition);
  }
  .proxy-dot.active {
    background: var(--green);
    box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
  }

  .proxy-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--fg-secondary);
  }

  .proxy-toggle {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 4px;
    transition: all var(--transition);
  }
  .proxy-toggle:hover { background: var(--accent-glow); }

  /* ── Section cards ── */
  .sections {
    display: flex;
    flex-direction: column;
    gap: 20px;
    flex: 1;
  }

  .card {
    background: var(--bg-base);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color var(--transition);
  }
  .card:hover { border-color: var(--border-medium); }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
  }
  .card.protect::before {
    background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%);
    opacity: 0.5;
  }
  .card.restore::before {
    background: linear-gradient(90deg, transparent 0%, var(--green) 50%, transparent 100%);
    opacity: 0.5;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .step-badge {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .protect .step-badge {
    background: var(--accent-glow);
    color: var(--accent);
    border: 1px solid rgba(59, 130, 246, 0.2);
  }
  .restore .step-badge {
    background: var(--green-glow);
    color: var(--green);
    border: 1px solid rgba(34, 197, 94, 0.2);
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
  }

  .card-subtitle {
    font-size: 12px;
    color: var(--fg-muted);
    margin-left: auto;
  }

  /* ── Textarea ── */
  .textarea-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  textarea {
    width: 100%;
    height: 130px;
    background: var(--bg-deep);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    color: var(--fg);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    padding: 14px 16px;
    resize: vertical;
    transition: all var(--transition);
    outline: none;
    user-select: text;
  }
  textarea::placeholder { color: var(--fg-muted); font-family: 'DM Sans', sans-serif; font-style: italic; }
  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .restore textarea:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-glow); }

  .paste-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--bg-raised);
    border: 1px solid var(--border-subtle);
    border-radius: 6px;
    color: var(--fg-muted);
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    padding: 4px 10px;
    cursor: pointer;
    transition: all var(--transition);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .paste-btn:hover { background: var(--bg-surface); color: var(--fg-secondary); border-color: var(--border-medium); }

  /* ── Buttons ── */
  .actions { display: flex; gap: 10px; align-items: center; }

  .btn-primary {
    flex: 1;
    padding: 12px 24px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }

  .btn-protect {
    background: linear-gradient(135deg, var(--accent) 0%, #4f46e5 100%);
    color: white;
    box-shadow: 0 4px 15px rgba(59, 130, 246, 0.25);
  }
  .btn-protect:hover {
    box-shadow: 0 6px 25px rgba(59, 130, 246, 0.35);
    transform: translateY(-1px);
  }
  .btn-protect:active { transform: translateY(0); }

  .btn-restore {
    background: linear-gradient(135deg, var(--green) 0%, #059669 100%);
    color: white;
    box-shadow: 0 4px 15px rgba(34, 197, 94, 0.25);
  }
  .btn-restore:hover {
    box-shadow: 0 6px 25px rgba(34, 197, 94, 0.35);
    transform: translateY(-1px);
  }
  .btn-restore:active { transform: translateY(0); }
  .btn-restore:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn-primary .spinner {
    display: none;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  .btn-primary.loading .btn-label { display: none; }
  .btn-primary.loading .spinner { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Status toast ── */
  .status-bar {
    min-height: 36px;
    display: flex;
    align-items: center;
    padding: 0;
  }

  .toast {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 500;
    animation: slideIn 0.3s ease-out;
    width: 100%;
  }
  .toast.visible { display: flex; }
  .toast.success { background: rgba(34, 197, 94, 0.1); color: var(--green); border: 1px solid rgba(34, 197, 94, 0.15); }
  .toast.info { background: var(--accent-glow); color: var(--accent-hover); border: 1px solid rgba(59, 130, 246, 0.15); }
  .toast.error { background: rgba(239, 68, 68, 0.1); color: var(--red); border: 1px solid rgba(239, 68, 68, 0.15); }
  .toast.warning { background: rgba(245, 158, 11, 0.1); color: var(--amber); border: 1px solid rgba(245, 158, 11, 0.15); }

  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Mapping preview ── */
  .mappings {
    display: none;
    margin-top: 12px;
    padding: 12px 14px;
    background: var(--bg-deep);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-subtle);
    max-height: 120px;
    overflow-y: auto;
  }
  .mappings.visible { display: block; animation: slideIn 0.3s ease-out; }

  .mapping-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 0;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .mapping-original { color: var(--red); text-decoration: line-through; opacity: 0.7; min-width: 0; flex-shrink: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mapping-arrow { color: var(--fg-muted); flex-shrink: 0; }
  .mapping-codename { color: var(--green); flex-shrink: 0; }

  /* ── Footer ── */
  .footer {
    padding: 16px 0 0;
    border-top: 1px solid var(--border-subtle);
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer span {
    font-size: 11px;
    color: var(--fg-muted);
    letter-spacing: 0.3px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--fg-muted); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-secondary); }
</style>
</head>
<body>

<div class="app">

  <!-- Topbar -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-icon">🛡</div>
      <div class="brand-text">
        <h1>AUSTR.AI</h1>
        <span>Privacy Firewall für KI-Dienste</span>
      </div>
    </div>
    <div class="proxy-badge" onclick="toggleProxy()">
      <div class="proxy-dot" id="proxyDot"></div>
      <span class="proxy-label" id="proxyLabel">Proxy prüfen…</span>
      <button class="proxy-toggle" id="proxyToggle">Start</button>
    </div>
  </div>

  <div class="sections">

    <!-- Step 1: Protect -->
    <div class="card protect">
      <div class="card-header">
        <div class="step-badge">1</div>
        <span class="card-title">Text schützen</span>
        <span class="card-subtitle">Sensible Daten werden durch Codenames ersetzt</span>
      </div>
      <div class="textarea-wrap">
        <textarea id="inputText" placeholder="Füge hier deinen Text ein, z.B. eine E-Mail, ein Dokument oder eine Nachricht mit vertraulichen Daten…"></textarea>
        <button class="paste-btn" onclick="pasteInput()">⌘V Einfügen</button>
      </div>
      <div class="actions">
        <button class="btn-primary btn-protect" id="protectBtn" onclick="protect()">
          <span class="btn-label">🔒 Schützen & Kopieren</span>
          <div class="spinner"></div>
        </button>
      </div>
      <div class="mappings" id="mappings"></div>
    </div>

    <!-- Status -->
    <div class="status-bar">
      <div class="toast" id="toast">
        <span id="toastIcon"></span>
        <span id="toastText"></span>
      </div>
    </div>

    <!-- Step 2: Restore -->
    <div class="card restore">
      <div class="card-header">
        <div class="step-badge">2</div>
        <span class="card-title">KI-Antwort wiederherstellen</span>
        <span class="card-subtitle">Codenames werden durch Originale ersetzt</span>
      </div>
      <div class="textarea-wrap">
        <textarea id="responseText" placeholder="Kopiere die Antwort von ChatGPT, Claude oder einem anderen KI-Dienst und füge sie hier ein…"></textarea>
        <button class="paste-btn" onclick="pasteResponse()">⌘V Einfügen</button>
      </div>
      <div class="actions">
        <button class="btn-primary btn-restore" id="restoreBtn" onclick="restore()" disabled>
          <span class="btn-label">🔓 Wiederherstellen & Kopieren</span>
          <div class="spinner"></div>
        </button>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <span>AUSTR.AI v1.0 — Deine Daten verlassen nie deinen Rechner ungeschützt</span>
    <span id="sessionInfo"></span>
  </div>

</div>

<script>
  // Wait for pywebview API to be ready
  const api = () => window.pywebview ? window.pywebview.api : null;

  // ── Proxy status ──
  async function checkProxy() {
    try {
      const status = await api().get_status();
      const dot = document.getElementById('proxyDot');
      const label = document.getElementById('proxyLabel');
      const toggle = document.getElementById('proxyToggle');
      if (status.proxy_running) {
        dot.classList.add('active');
        label.textContent = 'Proxy aktiv';
        toggle.textContent = 'Stop';
      } else {
        dot.classList.remove('active');
        label.textContent = 'Proxy gestoppt';
        toggle.textContent = 'Start';
      }
    } catch(e) {
      document.getElementById('proxyLabel').textContent = 'Nicht verbunden';
    }
  }

  async function toggleProxy() {
    try {
      document.getElementById('proxyLabel').textContent = '…';
      const result = await api().toggle_proxy();
      setTimeout(checkProxy, 1000);
    } catch(e) { showToast('Proxy-Fehler: ' + e, 'error'); }
  }

  // ── Protect ──
  async function protect() {
    const text = document.getElementById('inputText').value.trim();
    if (!text) { showToast('Kein Text eingegeben.', 'warning'); return; }

    const btn = document.getElementById('protectBtn');
    btn.classList.add('loading');
    showToast('Analysiere Text…', 'info');

    try {
      const result = await api().protect(text);

      document.getElementById('inputText').value = result.anonymized_text;
      document.getElementById('restoreBtn').disabled = false;

      if (result.entity_count > 0) {
        showMappings(result.mappings);
        showToast(`✓ ${result.entity_count} sensible Begriffe geschützt. In Zwischenablage kopiert — jetzt einfügen!`, 'success');
      } else {
        showToast('Keine sensiblen Daten erkannt. Text kopiert.', 'info');
        hideMappings();
      }
    } catch(e) {
      showToast('Fehler: ' + e, 'error');
    } finally {
      btn.classList.remove('loading');
    }
  }

  // ── Restore ──
  async function restore() {
    const text = document.getElementById('responseText').value.trim();
    if (!text) { showToast('Keine KI-Antwort eingegeben.', 'warning'); return; }

    const btn = document.getElementById('restoreBtn');
    btn.classList.add('loading');

    try {
      const result = await api().restore(text);
      document.getElementById('responseText').value = result.restored_text;
      showToast(`✓ ${result.replacements} Begriffe wiederhergestellt. In Zwischenablage kopiert!`, 'success');
      hideMappings();
    } catch(e) {
      showToast('Fehler: ' + e, 'error');
    } finally {
      btn.classList.remove('loading');
    }
  }

  // ── Clipboard ──
  async function pasteInput() {
    try {
      const text = await api().paste_clipboard();
      if (text) document.getElementById('inputText').value = text;
    } catch(e) {}
  }

  async function pasteResponse() {
    try {
      const text = await api().paste_clipboard();
      if (text) document.getElementById('responseText').value = text;
    } catch(e) {}
  }

  // ── Toast ──
  function showToast(message, type) {
    const toast = document.getElementById('toast');
    const icons = { success: '✓', info: 'ℹ', error: '✗', warning: '⚠' };
    document.getElementById('toastIcon').textContent = icons[type] || '';
    document.getElementById('toastText').textContent = message;
    toast.className = 'toast visible ' + type;
  }

  // ── Mappings preview ──
  function showMappings(mappings) {
    const el = document.getElementById('mappings');
    el.innerHTML = Object.entries(mappings).map(([codename, original]) =>
      `<div class="mapping-row">
        <span class="mapping-original">${escHtml(original)}</span>
        <span class="mapping-arrow">→</span>
        <span class="mapping-codename">${escHtml(codename)}</span>
      </div>`
    ).join('');
    el.classList.add('visible');
  }

  function hideMappings() {
    document.getElementById('mappings').classList.remove('visible');
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ── Init ──
  window.addEventListener('pywebviewready', () => {
    checkProxy();
    setInterval(checkProxy, 8000);
  });

  // Fallback if pywebview not available (testing in browser)
  setTimeout(() => {
    if (!window.pywebview) {
      document.getElementById('proxyLabel').textContent = 'Browser-Vorschau';
    }
  }, 2000);
</script>

</body>
</html>
